<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card content-card">
                    <div class="card-body p-4 p-lg-5">
                        <p class="section-kicker mb-2">Create Account</p>
                        <h1 class="h3 fw-bold mb-4">회원가입</h1>

                        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                        <form th:action="@{/signup}" th:object="${memberFormDto}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label for="loginId" class="form-label">아이디</label>
                                <input type="text" id="loginId" th:field="*{loginId}" class="form-control form-control-lg" autocomplete="username">
                                <div class="text-danger small mt-1" th:errors="*{loginId}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">비밀번호</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control form-control-lg" autocomplete="new-password">
                                <div class="text-danger small mt-1" th:errors="*{password}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="name" class="form-label">이름</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control form-control-lg">
                                <div class="text-danger small mt-1" th:errors="*{name}"></div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">가입하기</button>
                        </form>

                        <div class="text-center mt-4">
                            <span class="text-secondary">이미 계정이 있나요?</span>
                            <a th:href="@{/login}" class="fw-semibold">로그인</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
