<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div class="d-flex justify-content-between align-items-start align-items-md-center gap-3 flex-column flex-md-row mb-4">
            <div>
                <p class="section-kicker mb-2">Community</p>
                <h1 class="h3 fw-bold mb-0">게시글 목록</h1>
            </div>
            <a class="btn btn-primary" th:href="@{/questions/new}">글쓰기</a>
        </div>

        <div class="card content-card table-card">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 80px;">번호</th>
                    <th>제목</th>
                    <th style="width: 160px;">작성자</th>
                    <th style="width: 180px;">작성일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(questions)}">
                    <td colspan="4" class="text-center text-secondary py-5">등록된 게시글이 없습니다.</td>
                </tr>
                <tr th:each="question : ${questions}">
                    <td class="text-secondary" th:text="${question.id}">1</td>
                    <td>
                        <a class="fw-semibold text-decoration-none" th:href="@{/questions/{id}(id=${question.id})}" th:text="${question.title}">제목</a>
                    </td>
                    <td th:text="${question.writer != null ? question.writer.name : '작성자 없음'}">작성자</td>
                    <td class="text-secondary" th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-24</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
