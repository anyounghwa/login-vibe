<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div class="mb-4">
            <a th:href="@{/questions}" class="btn btn-outline-secondary">목록</a>
        </div>

        <article class="card content-card">
            <div class="card-header bg-white p-4">
                <h1 class="h3 fw-bold mb-3" th:text="${question.title}">게시글 제목</h1>
                <div class="d-flex gap-2 flex-wrap text-secondary small">
                    <span th:text="${question.writer != null ? question.writer.name : '작성자 없음'}">작성자</span>
                    <span>·</span>
                    <span th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
                </div>
            </div>
            <div class="card-body p-4">
                <p class="mb-0 pre-line" th:text="${question.content}">내용</p>
            </div>
        </article>

        <div class="d-flex gap-2 mt-4 flex-wrap" th:if="${canEdit}">
            <a class="btn btn-primary" th:href="@{/questions/{id}/edit(id=${question.id})}">수정</a>
            <form th:action="@{/questions/{id}/delete(id=${question.id})}" method="post"
                  onsubmit="return confirm('게시글을 삭제하시겠습니까?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-danger">삭제</button>
            </form>
        </div>

        <section class="mt-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h4 fw-bold mb-0">답글</h2>
                <span class="badge text-bg-primary" th:text="${#lists.size(question.answers)}">0</span>
            </div>

            <div class="card content-card mb-4">
                <div class="card-body p-4">
                    <div th:if="${#lists.isEmpty(question.answers)}" class="text-secondary text-center py-4">
                        아직 등록된 답글이 없습니다.
                    </div>

                    <div th:each="answer : ${question.answers}" class="border-bottom pb-3 mb-3">
                        <p class="pre-line mb-2" th:text="${answer.content}">답글 내용</p>
                        <div class="small text-secondary">
                            <span th:text="${answer.author != null ? answer.author.name : '작성자 없음'}">작성자</span>
                            <span>·</span>
                            <span th:text="${#temporals.format(answer.createDate, 'yyyy-MM-dd HH:mm')}">작성일</span>
                        </div>
                    </div>
                </div>
            </div>

            <div sec:authorize="isAuthenticated()" class="card content-card">
                <div class="card-body p-4">
                    <h3 class="h5 fw-bold mb-3">답글 작성</h3>
                    <div class="alert alert-danger" th:if="${answerErrorMessage}" th:text="${answerErrorMessage}"></div>
                    <form th:action="@{/answer/create/{questionId}(questionId=${question.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label for="answerContent" class="form-label">내용</label>
                            <textarea id="answerContent" name="content" class="form-control" rows="4"
                                      placeholder="답글을 입력해 주세요."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">답글 등록</button>
                    </form>
                </div>
            </div>

            <div sec:authorize="isAnonymous()" class="alert alert-info">
                로그인 후 답글을 작성할 수 있습니다.
            </div>
        </section>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
