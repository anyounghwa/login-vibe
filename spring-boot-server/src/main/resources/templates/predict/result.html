<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예측 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h3 mb-4 text-center">예측 결과</h1>

            <section class="card shadow-sm">
                <div class="card-body">
                    <dl class="row mb-4">
                        <dt class="col-5">키</dt>
                        <dd class="col-7" th:text="${request.height + ' cm'}">170 cm</dd>

                        <dt class="col-5">몸무게</dt>
                        <dd class="col-7" th:text="${request.weight + ' kg'}">70 kg</dd>

                        <dt class="col-5">예측 결과</dt>
                        <dd class="col-7 fw-bold text-primary" th:text="${response.result}">정상</dd>
                    </dl>

                    <div class="d-grid gap-2">
                        <a class="btn btn-primary" th:href="@{/predict}">다시 예측하기</a>
                        <a class="btn btn-outline-secondary" th:href="@{/}">메인으로</a>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>
</body>
</html>
