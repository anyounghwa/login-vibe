<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예측 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card content-card">
                    <div class="card-body p-4 p-lg-5">
                        <p class="section-kicker mb-2">Prediction Result</p>
                        <h1 class="h3 fw-bold mb-4">예측 결과</h1>

                        <div class="alert alert-primary d-flex justify-content-between align-items-center">
                            <span>비만 여부 예측 결과</span>
                            <strong th:text="${response.result}">정상</strong>
                        </div>

                        <dl class="row mb-4">
                            <dt class="col-5">키</dt>
                            <dd class="col-7" th:text="|${request.height} cm|">170 cm</dd>

                            <dt class="col-5">몸무게</dt>
                            <dd class="col-7" th:text="|${request.weight} kg|">70 kg</dd>
                        </dl>

                        <div class="d-grid gap-2">
                            <a class="btn btn-primary" th:href="@{/predict}">다시 예측하기</a>
                            <a class="btn btn-outline-secondary" th:href="@{/}">메인으로</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
