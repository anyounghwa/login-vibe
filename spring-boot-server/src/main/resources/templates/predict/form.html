<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비만 예측</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center g-4">
            <div class="col-lg-7">
                <div class="card content-card">
                    <div class="card-body p-4 p-lg-5">
                        <p class="section-kicker mb-2">AI Prediction</p>
                        <h1 class="h3 fw-bold mb-3">비만 여부 예측</h1>
                        <p class="text-secondary mb-4">
                            키와 몸무게를 입력하면 Flask AI 서버가 머신러닝 모델로 비만 여부를 예측합니다.
                            이 기능은 로그인하지 않아도 사용할 수 있습니다.
                        </p>

                        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

                        <form th:action="@{/predict}" th:object="${predictRequestDto}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="height" class="form-label">키(cm)</label>
                                    <input type="number" step="0.1" id="height" th:field="*{height}" class="form-control form-control-lg">
                                    <div class="text-danger small mt-1" th:errors="*{height}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label for="weight" class="form-label">몸무게(kg)</label>
                                    <input type="number" step="0.1" id="weight" th:field="*{weight}" class="form-control form-control-lg">
                                    <div class="text-danger small mt-1" th:errors="*{weight}"></div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">예측하기</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-primary-subtle bg-primary-subtle h-100">
                    <div class="card-body p-4">
                        <h2 class="h5 fw-bold">예측 기준</h2>
                        <p class="mb-0 text-secondary">
                            현재 모델은 건강검진 데이터의 키와 몸무게를 기반으로 BMI 패턴을 학습하여
                            비만 여부를 예측하는 구조입니다.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
