<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비만 예측</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Health AI</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/questions}">게시판</a>
            <a class="btn btn-outline-dark btn-sm" th:href="@{/login}">로그인</a>
            <a class="btn btn-primary btn-sm" th:href="@{/signup}">회원가입</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">
            <h1 class="h3 mb-3 text-center">비만 여부 예측</h1>
            <p class="text-secondary text-center mb-4">키와 몸무게를 입력하면 Flask AI 서버가 예측합니다.</p>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{/predict}" th:object="${predictRequestDto}" method="post" class="card p-4 shadow-sm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="height" class="form-label">키(cm)</label>
                    <input type="number" step="0.1" id="height" th:field="*{height}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{height}"></div>
                </div>

                <div class="mb-4">
                    <label for="weight" class="form-label">몸무게(kg)</label>
                    <input type="number" step="0.1" id="weight" th:field="*{weight}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{weight}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">예측하기</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
