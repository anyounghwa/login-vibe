<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="mb-4">
        <a th:href="@{/questions}" class="btn btn-outline-secondary btn-sm">목록</a>
    </div>

    <article class="card shadow-sm">
        <div class="card-header bg-white">
            <h1 class="h4 mb-2" th:text="${question.title}">게시글 제목</h1>
            <div class="text-secondary small">
                <span th:text="${question.writer != null ? question.writer.name : '작성자 없음'}">작성자</span>
                <span class="mx-1">·</span>
                <span th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span>
            </div>
        </div>
        <div class="card-body">
            <p class="mb-0" style="white-space: pre-line;" th:text="${question.content}">내용</p>
        </div>
    </article>

    <div class="d-flex gap-2 mt-4" th:if="${canEdit}">
        <a class="btn btn-primary" th:href="@{/questions/{id}/edit(id=${question.id})}">수정</a>
        <form th:action="@{/questions/{id}/delete(id=${question.id})}" method="post"
              onsubmit="return confirm('게시글을 삭제하시겠습니까?');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-danger">삭제</button>
        </form>
    </div>
</main>
</body>
</html>
