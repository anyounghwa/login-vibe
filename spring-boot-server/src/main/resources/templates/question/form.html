<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">게시글 폼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="h3 mb-4" th:text="${formTitle}">게시글 등록</h1>

            <form th:action="@{${actionUrl}}" th:object="${questionFormDto}" method="post" class="card p-4 shadow-sm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="title" class="form-label">제목</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{title}"></div>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label">내용</label>
                    <textarea id="content" th:field="*{content}" class="form-control" rows="10"></textarea>
                    <div class="text-danger small mt-1" th:errors="*{content}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <a th:href="@{/questions}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
