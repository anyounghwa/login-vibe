<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">게시글 폼</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="mb-4">
                    <p class="section-kicker mb-2">Question Board</p>
                    <h1 class="h3 fw-bold mb-0" th:text="${formTitle}">게시글 등록</h1>
                </div>

                <div class="card content-card">
                    <div class="card-body p-4">
                        <form th:action="@{${actionUrl}}" th:object="${questionFormDto}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label for="title" class="form-label">제목</label>
                                <input type="text" id="title" th:field="*{title}" class="form-control form-control-lg">
                                <div class="text-danger small mt-1" th:errors="*{title}"></div>
                            </div>

                            <div class="mb-4">
                                <label for="content" class="form-label">내용</label>
                                <textarea id="content" th:field="*{content}" class="form-control" rows="10"></textarea>
                                <div class="text-danger small mt-1" th:errors="*{content}"></div>
                            </div>

                            <div class="d-flex gap-2 flex-wrap">
                                <button type="submit" class="btn btn-primary">저장</button>
                                <a th:href="@{/questions}" class="btn btn-outline-secondary">취소</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
