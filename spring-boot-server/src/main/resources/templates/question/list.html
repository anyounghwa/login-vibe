<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Health AI</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-primary btn-sm" th:href="@{/predict}">AI 예측</a>
            <a class="btn btn-outline-dark btn-sm" th:href="@{/questions}">게시판</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">게시글 목록</h1>
        <a class="btn btn-primary" th:href="@{/questions/new}">글쓰기</a>
    </div>

    <table class="table table-hover align-middle">
        <thead>
        <tr>
            <th style="width: 80px;">번호</th>
            <th>제목</th>
            <th style="width: 160px;">작성자</th>
            <th style="width: 180px;">작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(questions)}">
            <td colspan="4" class="text-center text-secondary py-5">등록된 게시글이 없습니다.</td>
        </tr>
        <tr th:each="question : ${questions}">
            <td th:text="${question.id}">1</td>
            <td>
                <a th:href="@{/questions/{id}(id=${question.id})}" th:text="${question.title}">제목</a>
            </td>
            <td th:text="${question.writer != null ? question.writer.name : '작성자 없음'}">작성자</td>
            <td th:text="${#temporals.format(question.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-24</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
