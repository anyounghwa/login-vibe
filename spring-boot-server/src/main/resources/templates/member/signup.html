<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <h1 class="h3 mb-4 text-center">회원가입</h1>

            <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <form th:action="@{/signup}" th:object="${memberFormDto}" method="post" class="card p-4 shadow-sm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="loginId" class="form-label">아이디</label>
                    <input type="text" id="loginId" th:field="*{loginId}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{loginId}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{password}"></div>
                </div>

                <div class="mb-4">
                    <label for="name" class="form-label">이름</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{name}"></div>
                </div>

                <button type="submit" class="btn btn-primary w-100">가입하기</button>
                <a th:href="@{/login}" class="btn btn-link mt-3">이미 계정이 있습니다</a>
            </form>
        </div>
    </div>
</main>
</body>
</html>
