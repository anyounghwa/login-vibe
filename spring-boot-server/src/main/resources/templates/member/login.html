<!doctype html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/navbar :: navbar}"></div>

<main class="page-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card content-card">
                    <div class="card-body p-4 p-lg-5">
                        <p class="section-kicker mb-2">Member Login</p>
                        <h1 class="h3 fw-bold mb-4">로그인</h1>

                        <div class="alert alert-danger" th:if="${param.error}">
                            아이디 또는 비밀번호가 올바르지 않습니다.
                        </div>
                        <div class="alert alert-success" th:if="${param.logout}">
                            로그아웃되었습니다.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label for="username" class="form-label">아이디</label>
                                <input type="text" id="username" name="username" class="form-control form-control-lg" autocomplete="username">
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">비밀번호</label>
                                <input type="password" id="password" name="password" class="form-control form-control-lg" autocomplete="current-password">
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">로그인</button>
                        </form>

                        <div class="text-center mt-4">
                            <span class="text-secondary">아직 계정이 없나요?</span>
                            <a th:href="@{/signup}" class="fw-semibold">회원가입</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
